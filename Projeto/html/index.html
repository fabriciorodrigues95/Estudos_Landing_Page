<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echosoft</title>
    <style>
        body{
            margin:0;
            padding: 0;
            height: 2200px;
        }
        
        .head_principal{
            background-color: #003866;
            max-width: 100%;
            height: 150px;
            display: flex;
            justify-content: space-between;
            
        }
        .head_principal_logo{
            display: flex;
            width: 200px;
            align-items: center;
            font-size:70px ;
            color: #fff;
            margin-left: 200px;
        }
        .head_principal_menu{
          display: flex;
          align-items: center;
          margin-right: 300px;
          color: #fff;    
        }

        nav ul,li{
            list-style: none;
            margin: 20px;
            font-size: 30px;
        }
        nav ul{
            display: flex;
            

        }
        /* nav li:hover{
            background-color: #dddddd;
            color: #ffffff;
        }
         */

          #banner{
             display: flex;
             background-image: url('../img/banner.jpg');
             background-size: cover;
             width: 100%;
             height: 980px;
             

         }
         .conteudo {
             display: flex;
             background-color: #4887bb;
             width: auto;
             height: 150px;
             justify-content: center;
         }
         .conteudoint{
            display: flex;
            align-items: center;
            justify-content: center; 
            font-size: 25px;
            color: #fff;
         }
         
         

    </style>
</head>
<body>
    <header>
        <div class="head_principal">
            <!-- Logo -->
            <div class="head_principal_logo">
                Echosoft
            </div>
            <!-- Menus -->
            <div class="head_principal_menu">
                <nav >
                    <ul>
                        
                        <li>Contato</li>
                    </ul>

                </nav>
            </div>
        </div>
        <aside id="banner" ></aside>
        <section class="conteudo">
            <div class="conteudoint">
                <p>Como uma Landing Page irá ajudar meu negócio?</p>
            </div>      
        </section>
    </header>
</body>
</html>
