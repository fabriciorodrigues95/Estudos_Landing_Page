<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href=".//assets/css/bootstrap.min.css">
    <title>Document</title>
    <style>
         .row [class^=col], .row .col{
            background-color: #ddd;
            border: 1px solid #ccc;
        }
        #area, #area1{
            border: 1px solid #000;
            border-radius: 10px;
            padding: 20px;
            
            background-color: #eee;
        }
        div#area,div#area1 {
             margin-top: 11px;
             margin-bottom: 11px;
            }
    </style>
</head>
<body>
   <div class="container">
       <!-- Aqui faz o texto para sumir e aparecer -->
       <button class="btn btn-primary" data-toggle="collapse" data-target="#area">
            Saiba Mais
       </button>
       <div id="area" class="collapse">
            <p>Texto escondido que vai aparecer</p>   
       </div>
        <!-- Aqui faz o texto para sumir e aparecer -->
        <button class="btn btn-primary" data-toggle="collapse" data-target="#area1">
            Saiba Mais
       </button>
       <div id="area1" class="collapse">
            <p>Segundo texto</p>   
       </div>
   </div>
