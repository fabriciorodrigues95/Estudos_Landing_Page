<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=".//assets/css/bootstrap.min.css">
    <title>Document</title>
    <style>
         .row [class^=col], .row .col{
            background-color: #ddd;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
   <div class="container">
       <div style="width: 500px">
           <!-- img-fluid usado para se adaptar responsivelmente , sem quebrar o site -->
       <img src="assets/img/wallpaper_imagemjpg" class="img-fluid" >
       </div>
       <!-- Efeito atraves da imagem -->
       <img src="assets/img/dr.jpg" class="img-thumbnail">
       
       <!-- Deixar as bordas arredondasdas-->
       <img src="assets/img/dr.jpg" class="rounded ">

       <!-- Além de deixar as bordas arredondadas, também deixaria responsivel -->
       <img src="assets/img/dr.jpg" class="rounded img-fluid">

       <!-- Utilizando o float Alinhando a imagem, left,center ou right -->
       <img src="assets/img/dr.jpg" class="rounded img-fluid float-right"> 

   </div>
   <!-- Utilizando a tag figure -->
   <div class="container">
       <figure class="figure">
            <!-- Aqui configuramos a nossa imagem -->
            <img src="assets/img/logo.png" class="figure-img img-fluid rouded img-thumbnail" > <!--O padrão de se usar nesses casos é só o class="figure-img  -->
                <!--Aqui colocamos a legenda e alinhamos do jeito que queremos, center,right,left  -->
            <figcaption class="figure-caption text-center">Logo</figcaption> <!--Neste aqui seria o class="figure-caption-->
       </figure>
   </div>
      
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/Bootstrap_projeto/assets/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
