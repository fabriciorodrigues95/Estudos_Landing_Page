<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=".//assets/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        .row [class^=col],
        .row .col {
            background-color: #ddd;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="dropdown">
            <!-- Criar um botão -->
            <!-- dropdown-toggle - É onde habilita a flecha indicando que tem opções para escolher 
                 data-toggle-dropdown -> É o responsável por quando clicar aparece e quando clicar novamente sumir
            -->
            <a href="#" class="btn btn-primary dropdown-toggle" data-toggle="dropdown">Login</a>
            <div class="dropdown-menu">
                <form action="" method="post">
                    Login: <br>
                    <input type="text" name="Usuario">
                    <br>
                    Senha: <br>
                    <input type="password" name="Senha">
                </form>
               
            </div>
        </div>
        <!-- Podemos usar o 
            dropright ->direita
            dropleft -> esquerda
            dropup->cima
            dropdow->baixo
        -->
        <div class="dropdown dropup">
            <!-- Criar um botão -->
            <!-- dropdown-toggle - É onde habilita a flecha indicando que tem opções para escolher 
                 data-toggle-dropdown -> É o responsável por quando clicar aparece e quando clicar novamente sumir
            -->
            <a href="#" class="btn btn-primary dropdown-toggle" data-toggle="dropdown" >Login</a>
            <div class="dropdown-menu">
                <form action="" method="post">
                    Login: <br>
                    <input type="text" name="Usuario">
                    <br>
                    Senha: <br>
                    <input type="password" name="Senha">
                </form>
               
            </div>
        </div>
        <div class="dropdown ">
            <!-- Criar um botão -->
            <!-- dropdown-toggle - É onde habilita a flecha indicando que tem opções para escolher 
                 data-toggle-dropdown -> É o responsável por quando clicar aparece e quando clicar novamente sumir
            -->
            <a href="#" class="btn btn-primary dropdown-toggle" data-toggle="dropdown" >Login</a>
            <div class="dropdown-menu">
                <a href="" class="dropdown-item">Google</a>
                <div class="dropdown-divider"></div>
                <a href="" class="dropdown-item">Facebook</a>
                <div class="dropdown-divider"></div>
                <a href="" class="dropdown-item">Instagram</a>
                <div class="dropdown-divider"></div>
                <a href="" class="dropdown-item">Linkedin</a>
               
            </div>
        </div>
          <!-- Utilizando a classe btn-group para criar múltiplas funcionalidades na mesma área -->
        <div class="dropdown btn-group  ">
            <!-- Criar um botão -->
            <!-- dropdown-toggle - É onde habilita a flecha indicando que tem opções para escolher 
                 data-toggle-dropdown -> É o responsável por quando clicar aparece e quando clicar novamente sumir
            -->
          <!-- Aqui temos dois links porém podemos utilizar um para ir para um site, rodar um script e usar outro para aparecer uma opção ou 
        várias, ou outras informações que queremos. Podemos usar tanto a tag a quanto um botão para usar essa técnica.
                Ele funciona exatamente assim:
            Em um você cria uma classe btn btn-primary e coloca o nome ou o código no caso se fosse um script <script>
            E no outro utilizamos  a seguinte forma: class="btn btn-primary dropdown-toggle dropdow-toogle-split -> Aqui estamos dizendo que será
            um botão com uma flecha para baixo e que terá uma funcionalidade dupla ou seja será onde irá aparecer as opções abaixo, enquanto o 
            anterior roda o site do instagram, então quando o usário for clicar no instagram vai para o site deles e quando clicar no botão que 
            está em branco , vai aparecer as opções .
 -->
            <a href="http://www.Instagram.com"  class="btn btn-primary" >Instagram</a>
            <a href="#" class="btn btn-primary dropdown-toggle dropdow-toogle-split" data-toggle="dropdown" ></a>
            <div class="dropdown-menu">
                <a href="" class="dropdown-item">Google</a>
               
                <a href="" class="dropdown-item">Facebook</a>
                
                <a href="" class="dropdown-item">Instagram</a>
               
                <a href="" class="dropdown-item">Linkedin</a>
               
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="../assets/Bootstrap_projeto/assets/js/bootstrap.bundle.min.js"></script>
    <!-- Este daqui que faz o efeito de desaparecer -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>

</html>
