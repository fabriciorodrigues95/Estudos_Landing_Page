<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=".//assets/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        .row [class^=col], .row .col{
            background-color: #ddd;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">Primeira</div>
            <div class="col">Segunda</div>
            <!-- Aqui faŕa com que a primeira será o texto
            descrito "Terceira" -->
            <div class="col order-first">Terceira</div>
        </div> 
        <br>
        <br>
        <div class="container">
            <div class="row">
                <!-- Aqui tem preferencia já que é usado
                last para último ou first para o primeiro  -->
                <div class="col">Primeira</div>
                <div class="col order-last">Segunda</div>
                <div class="col ">Terceira</div>
            </div> 
            <br>
            <br>
            <!-- Aqui que se usa números, vai ordernar primeiro 
            pelas quais não estão com order e depois vai ser se tem 
        alguma que está ordenada numericamente, como está logo abaixo -->
            <div class="container">
                <div class="row">
                    <div class="col order-5">Primeira</div>
                    <div class="col order-4">Segunda</div>
                    <div class="col order-3">Terceira</div>
                    <div class="col order-2 ">Quarta</div>
                    <div class="col order-1">Quinta</div>
                </div> 
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/Bootstrap_projeto/assets/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
