<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=".//assets/css/bootstrap.min.css">
    <title>Document</title>
    <style>
         .row [class^=col], .row .col{
            background-color: #ddd;
            border: 1px solid #ccc;
        }
       
    </style>
</head>
<body>
   
      <div class="container">
        <!-- Deixando a tabela responsiva -->
        <div class="table-responsive">
       <!-- 
            *Utilizando a classe table, já organiza automaticamente (formata)
            *Utilizando logo ao lado table-dark,a tabela fica escura
            *Combinação de do table-striped -. que faz a distinção das informações, colocando um branco numa linha e cinza na outra
            *table-bordered-> Deixa as bordas na tabela para ajudar ainda mais na visualização
            *table-hover -> Destaque conforme vai passando o mouse
            *table-sm -> Deixa menor os espaçamentos
        -->
            <table class="table table-striped table-bordered table-hover table-sm ">
                <!-- 
                    * Usando o thead-light fica uma cor mais clara no título 
                    * Usando o thead-dark fica uma cor mais escura no titulo
  
                 -->
                <thead class="thead-light">
                  <tr>
                      <th>#</th>
                      <th>Nome</th>
                      <th>Sobrenome</th>
                      <th>Idade</th>
                  </tr>
                </thead>
  
                <tbody>
                  <tr>
                      <td>1</td>
                      <td>Fabricio</td>
                      <td>Gomes</td>
                      <td>27</td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>Fernanda</td>
                    <td>Lima</td>
                    <td>22</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Fred</td>
                    <td>JR</td>
                    <td>2</td>
                </tr>
                </tbody>
                
            </table>
        </div>
          
      </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/Bootstrap_projeto/assets/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
